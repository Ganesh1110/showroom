<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earth Positive — Virtual Flagship</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>

<div id="loading">
  <div class="loader-ring"></div>
  <div class="loader-brand">EARTH POSITIVE</div>
  <div class="loader-sub">Flagship Building</div>
</div>

<div id="header">
  <div class="brand">
    <div class="brand-name">EARTH POSITIVE</div>
    <div class="brand-sub">Flagship Store</div>
  </div>
  <div class="tagline">
    <span class="tag-line">Fashion for the People, the Planet, the Future</span>
    <span class="tag-sub">Organic · Ethical · Climate Neutral</span>
  </div>
</div>

<div id="floor-info">
  <div class="fi-title" id="fiTitle">Earth Positive Flagship</div>
  <div class="fi-desc" id="fiDesc">Explore our luxury collections</div>
</div>

<div id="nav-dots">
  <button class="dot active" data-idx="0"><span class="dot-label">Overview</span></button>
  <button class="dot" data-idx="1"><span class="dot-label">Lobby</span></button>
  <button class="dot" data-idx="2"><span class="dot-label">T‑Shirts</span></button>
  <button class="dot" data-idx="3"><span class="dot-label">Hoodies</span></button>
  <button class="dot" data-idx="4"><span class="dot-label">Accessories</span></button>
  <button class="dot" data-idx="5"><span class="dot-label">Penthouse</span></button>
</div>

<div id="hint">DRAG TO EXPLORE · SCROLL TO ZOOM · CLICK DOTS TO NAVIGATE</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
