<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Earth Positive — Luxury Flagship</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #07070a; font-family: 'Inter', sans-serif; }
canvas { display: block; }
#hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
#brand { position: absolute; top: 32px; left: 40px; }
#brand .emblem {
  width: 28px; height: 28px; border: 1.5px solid rgba(201,168,76,0.4);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif; font-size: 11px;
  color: rgba(201,168,76,0.6); letter-spacing: 2px; margin-bottom: 8px;
}
#brand h1 {
  font-family: 'Playfair Display', serif; font-weight: 400;
  font-size: 12px; letter-spacing: 4px;
  color: rgba(255,255,255,0.45); text-transform: uppercase;
}
#brand h2 {
  font-family: 'Playfair Display', serif; font-weight: 400;
  font-size: 20px; letter-spacing: 2px;
  color: rgba(255,255,255,0.85); margin-top: 1px;
}
#brand .tagline {
  font-size: 9px; font-weight: 300; letter-spacing: 2px;
  color: rgba(255,255,255,0.25); margin-top: 4px; text-transform: uppercase;
}
#controls-hint {
  position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
  font-size: 9px; font-weight: 400; letter-spacing: 1.5px;
  color: rgba(255,255,255,0.15); text-transform: uppercase;
}
#floor-ui {
  position: absolute; right: 28px; top: 50%; transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 6px; pointer-events: auto;
}
#floor-ui button {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(0,0,0,0.35); backdrop-filter: blur(8px);
  color: rgba(255,255,255,0.25); font-size: 10px;
  cursor: pointer; transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
  font-family: 'Inter', sans-serif; letter-spacing: 1px;
}
#floor-ui button:hover {
  border-color: rgba(201,168,76,0.4); color: rgba(255,255,255,0.6);
  background: rgba(0,0,0,0.5);
}
#floor-ui button.active {
  border-color: rgba(201,168,76,0.5); color: #e8d08a;
  background: rgba(201,168,76,0.08);
  box-shadow: 0 0 16px rgba(201,168,76,0.08);
}
#floor-ui .sep { width: 14px; height: 1px; background: rgba(255,255,255,0.04); margin: 3px auto; }
#floor-ui .outlink {
  width: 28px; height: 28px; border-radius: 50%; margin: 0 auto;
  border: 1px solid rgba(255,255,255,0.06);
  background: rgba(0,0,0,0.25); backdrop-filter: blur(8px);
  color: rgba(255,255,255,0.2); font-size: 12px; cursor: pointer;
  transition: all 0.4s ease; display: flex; align-items: center;
  justify-content: center; pointer-events: auto; text-decoration: none;
}
#floor-ui .outlink:hover { border-color: rgba(201,168,76,0.3); color: rgba(201,168,76,0.5); }
#loading {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #07070a; transition: opacity 0.8s ease;
}
#loading.hidden { opacity: 0; pointer-events: none; }
#loading .ring {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1.5px solid rgba(201,168,76,0.1);
  border-top-color: #c9a84c;
  animation: spin 1.2s cubic-bezier(0.4,0,0.2,1) infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading p { margin-top: 14px; font-size: 9px; letter-spacing: 3px; color: rgba(255,255,255,0.2); text-transform: uppercase; }
</style>
</head>
<body>
<div id="loading"><div class="ring"></div><p>Loading</p></div>
<div id="hud">
  <div id="brand">
    <div class="emblem">EP</div>
    <h1>Earth Positive</h1>
    <h2>Flagship Store</h2>
    <div class="tagline">Fashion for the People, the Planet, the Future</div>
  </div>
  <div id="floor-ui">
    <button data-floor="0" class="active">G</button>
    <button data-floor="1">1</button>
    <button data-floor="2">2</button>
    <div class="sep"></div>
    <button id="reset-view" title="Reset View">&#8962;</button>
    <a class="outlink" href="https://earthpositiveonline.com" target="_blank" title="Visit Website">&#8599;</a>
  </div>
  <div id="controls-hint">Drag to orbit &middot; Scroll to zoom &middot; Click floors</div>
</div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const W1=20, D1=13, W2=17, D2=11, W3=14, D3=9, FH=4.8;
const F1=0, F2=FH+0.35, F3=(FH+0.35)*2, ROOF=(FH+0.35)*3+0.35;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x07070a);
scene.fog = new THREE.Fog(0x07070a, 35, 65);

const camera = new THREE.PerspectiveCamera(30, innerWidth/innerHeight, 0.1, 100);
camera.position.set(18, 9, 24);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.prepend(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 6, 0);
controls.enablePan = false;
controls.minDistance = 7;
controls.maxDistance = 42;
controls.maxPolarAngle = Math.PI / 2.02;
controls.minPolarAngle = Math.PI / 5.5;
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.rotateSpeed = 0.35;
controls.update();

const clock = new THREE.Clock();

const TC = new Map();
function tex(name, w, h, fn) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h; fn(c.getContext('2d'), w, h);
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.anisotropy = renderer.capabilities.getMaxAnisotropy();
  t.colorSpace = THREE.SRGBColorSpace;
  TC.set(name, t); return t;
}
tex('marble', 1024, 1024, (ctx, w, h) => {
  ctx.fillStyle = '#f2efe9'; ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < 120; i++) {
    ctx.strokeStyle = 'rgba(180,174,163,' + (0.015 + Math.random() * 0.035) + ')';
    ctx.lineWidth = 0.5 + Math.random() * 2.5; ctx.beginPath();
    let x = Math.random() * w, y = Math.random() * h; ctx.moveTo(x, y);
    for (let j = 0; j < 12 + Math.floor(Math.random() * 30); j++) {
      x += (Math.random() - 0.5) * 60; y += (Math.random() - 0.5) * 25; ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  for (let i = 0; i < 400; i++) {
    ctx.fillStyle = 'rgba(255,255,255,' + (Math.random() * 0.06) + ')';
    ctx.fillRect(Math.random() * w, Math.random() * h, 0.5 + Math.random() * 1.5, 0.5 + Math.random() * 1.5);
  }
});
tex('bronze', 512, 512, (ctx, w, h) => {
  const g = ctx.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0, '#5a4e32'); g.addColorStop(0.3, '#7a6a48'); g.addColorStop(0.6, '#6a5a3a'); g.addColorStop(1, '#4a3e22');
  ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < 80; i++) {
    ctx.strokeStyle = 'rgba(200,180,140,' + (Math.random() * 0.06) + ')';
    ctx.lineWidth = 0.5 + Math.random() * 0.5;
    ctx.moveTo(Math.random() * w, Math.random() * h); ctx.lineTo(Math.random() * w, Math.random() * h); ctx.stroke();
  }
});
tex('travertine', 512, 512, (ctx, w, h) => {
  ctx.fillStyle = '#d6d0c4'; ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < 400; i++) {
    ctx.fillStyle = 'rgba(190,184,172,' + (Math.random() * 0.04) + ')';
    ctx.fillRect(Math.random() * w, Math.random() * h, 4 + Math.random() * 12, 2 + Math.random() * 4);
  }
});
tex('darkstone', 512, 512, (ctx, w, h) => {
  ctx.fillStyle = '#141418'; ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < 3000; i++) {
    const v = 16 + Math.random() * 22;
    ctx.fillStyle = 'rgba(' + v + ',' + v + ',' + (v+2) + ',' + (Math.random() * 0.4) + ')';
    ctx.fillRect(Math.random() * w, Math.random() * h, 0.5 + Math.random(), 0.5 + Math.random());
  }
});
function T(name) { return TC.get(name); }

const amb = new THREE.AmbientLight(0x303050, 0.25); scene.add(amb);

const key = new THREE.DirectionalLight(0xffeedd, 2.8);
key.position.set(18, 28, 14);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 0.5; key.shadow.camera.far = 55;
key.shadow.camera.left = -18; key.shadow.camera.right = 18;
key.shadow.camera.top = 22; key.shadow.camera.bottom = -10;
key.shadow.bias = -0.0003; key.shadow.radius = 4;
scene.add(key);
new THREE.DirectionalLight(0x8888cc, 0.3).position.set(-12, 8, -10).apply(null, [scene]);
new THREE.DirectionalLight(0xffccaa, 0.25).position.set(-5, 25, -18).apply(null, [scene]);
new THREE.PointLight(0xff8844, 0.4, 30).position.set(0, 2, -10).apply(null, [scene]);

const gnd = new THREE.Mesh(new THREE.PlaneGeometry(70, 70),
  new THREE.MeshStandardMaterial({ map: T('darkstone'), roughness: 0.2, metalness: 0.35 }));
gnd.rotation.x = -Math.PI / 2; gnd.position.y = -0.15; gnd.receiveShadow = true; scene.add(gnd);

const pool = new THREE.Mesh(new THREE.BoxGeometry(10, 0.12, 5),
  new THREE.MeshPhysicalMaterial({ color: 0x0a1a28, roughness: 0, metalness: 0, transparent: true, opacity: 0.7 }));
pool.position.set(0, 0.02, -D1/2 - 4); scene.add(pool);
const pe = new THREE.Mesh(new THREE.BoxGeometry(10.4, 0.06, 5.4),
  new THREE.MeshStandardMaterial({ map: T('travertine'), roughness: 0.5, metalness: 0 }));
pe.position.set(0, 0.09, -D1/2 - 4); scene.add(pe);

const mM = () => new THREE.MeshStandardMaterial({ map: T('marble'), roughness: 0.12, metalness: 0.05 });
const tM = () => new THREE.MeshStandardMaterial({ map: T('travertine'), roughness: 0.45, metalness: 0 });
const bM = () => new THREE.MeshStandardMaterial({ map: T('bronze'), roughness: 0.3, metalness: 0.65 });

[{sx:W1+1.4,sz:D1+1.4,y:F1},{sx:W2+1.2,sz:D2+1.2,y:F2},{sx:W3+1.0,sz:D3+1.0,y:F3}].forEach(o=>{
  const s = new THREE.Mesh(new THREE.BoxGeometry(o.sx,0.3,o.sz), tM());
  s.position.set(0,o.y,0); s.receiveShadow = s.castShadow = true; scene.add(s);
});
const roof = new THREE.Mesh(new THREE.BoxGeometry(W3+1.8,0.35,D3+1.8), tM());
roof.position.set(0,ROOF,0); roof.receiveShadow = roof.castShadow = true; scene.add(roof);

function doWalls(w,d,y) {
  const bw = new THREE.Mesh(new THREE.BoxGeometry(w, FH-0.1, 0.15), mM());
  bw.position.set(0,y+FH/2,-d/2+0.1); bw.castShadow = true; scene.add(bw);
  for (const s of [-1,1]) {
    const sw = new THREE.Mesh(new THREE.BoxGeometry(0.15, FH-0.1, d), mM());
    sw.position.set(s*(w/2-0.1), y+FH/2, 0); sw.castShadow = true; scene.add(sw);
  }
}
doWalls(W1,D1,F1); doWalls(W2,D2,F2); doWalls(W3,D3,F3);

function cols(w,d,y,n) {
  const sp = (w-0.8)/(n-1);
  for (let i=0; i<n; i++) {
    for (const z of [-d/2+0.3, d/2-0.3]) {
      const c = new THREE.Mesh(new THREE.BoxGeometry(0.35, FH-0.2, 0.35), mM());
      c.position.set(-w/2+0.4+i*sp, y+FH/2, z); c.castShadow = true; scene.add(c);
    }
  }
}
cols(W1,D1,F1,7); cols(W2,D2,F2,6); cols(W3,D3,F3,5);

const gM = () => new THREE.MeshPhysicalMaterial({
  color: 0x7a9cbb, transparent: true, opacity: 0.18, roughness: 0.05, metalness: 0, side: THREE.DoubleSide, envMapIntensity: 0.8,
});
function glass(w,d,y,n) {
  const sp = (w-0.8)/(n-1), pw = sp-0.35;
  for (let i=0; i<n-1; i++) {
    for (const z of [-d/2+0.35, d/2-0.35]) {
      const g = new THREE.Mesh(new THREE.PlaneGeometry(pw, FH-0.4), gM());
      g.position.set(-w/2+0.4+(i+0.5)*sp, y+FH/2, z);
      if (z>0) g.rotation.y = Math.PI; scene.add(g);
    }
  }
}
glass(W1,D1,F1,7); glass(W2,D2,F2,6); glass(W3,D3,F3,5);

function mullions(w,d,y) {
  for (let f=0; f<=1; f++) {
    for (const z of [-d/2+0.35, d/2-0.35]) {
      const m = new THREE.Mesh(new THREE.BoxGeometry(w-0.6, 0.05, 0.05), bM());
      m.position.set(0, y+f*FH, z); scene.add(m);
    }
  }
}
mullions(W1,D1,F1); mullions(W2,D2,F2); mullions(W3,D3,F3);

function vertMullions(w,d,y,n) {
  const sp = (w-0.8)/(n-1);
  for (let i=1; i<n; i++) {
    for (const z of [-d/2+0.35, d/2-0.35]) {
      const m = new THREE.Mesh(new THREE.BoxGeometry(0.05, FH-0.2, 0.05), bM());
      m.position.set(-w/2+0.4+i*sp-sp/2, y+FH/2, z); scene.add(m);
    }
  }
}
vertMullions(W1,D1,F1,7); vertMullions(W2,D2,F2,6); vertMullions(W3,D3,F3,5);

const t2 = new THREE.Mesh(new THREE.BoxGeometry(W2+0.6, 0.12, (D1-D2)/2+0.4), tM());
t2.position.set(0, F2-0.1, -D2/2-(D1-D2)/4-0.2); scene.add(t2);
const t3 = new THREE.Mesh(new THREE.BoxGeometry(W3+0.5, 0.12, (D2-D3)/2+0.4), tM());
t3.position.set(0, F3-0.1, -D3/2-(D2-D3)/4-0.2); scene.add(t3);

const canopy = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.06, 1.8), bM());
canopy.position.set(0, FH-0.3, -D1/2-0.6); scene.add(canopy);
for (const x of [-1.8, 1.8]) {
  const rod = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.5, 6), bM());
  rod.position.set(x, FH-0.05, -D1/2-0.6); scene.add(rod);
}
const eMat = new THREE.MeshPhysicalMaterial({ color: 0x7799bb, transparent: true, opacity: 0.12, roughness: 0.05, metalness: 0, side: THREE.DoubleSide });
const entry = new THREE.Mesh(new THREE.PlaneGeometry(2.6, FH*1.4), eMat);
entry.position.set(0, F1+FH*0.7, -D1/2-0.15); scene.add(entry);
for (const x of [-1.35, 1.35]) {
  const f = new THREE.Mesh(new THREE.BoxGeometry(0.06, FH*1.4, 0.08), bM());
  f.position.set(x, F1+FH*0.7, -D1/2-0.15); scene.add(f);
}

for (const fl of [F1, F2, F3]) {
  const fw = fl===F1?W1:fl===F2?W2:W3, fd = fl===F1?D1:fl===F2?D2:D3;
  const gw = new THREE.Mesh(new THREE.PlaneGeometry(fw-2, FH-0.6),
    new THREE.MeshBasicMaterial({ color: 0xffcc88, transparent: true, opacity: 0.045, side: THREE.DoubleSide }));
  gw.position.set(0, fl+FH/2, -fd/2+0.5); scene.add(gw);
  new THREE.PointLight(0xffbb66, 0.6, 8).position.set(0, fl+FH*0.6, 0).apply(null, [scene]);
}

function mann(x,y,z) {
  const bM2 = new THREE.MeshStandardMaterial({ color: 0xd4d0cc, roughness: 0.5, metalness: 0 });
  new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.4, 8),
    new THREE.MeshStandardMaterial({ color: 0x222226, roughness: 0.4, metalness: 0.5 })).position.set(x,y+0.2,z).apply(null, [scene]);
  new THREE.Mesh(new THREE.CapsuleGeometry(0.12, 0.4, 4, 8), bM2).position.set(x,y+0.65,z).apply(null, [scene]);
  new THREE.Mesh(new THREE.SphereGeometry(0.08, 10, 10),
    new THREE.MeshStandardMaterial({ color: 0xbbbbbb, roughness: 0.4 })).position.set(x,y+0.95,z).apply(null, [scene]);
}
for (const fl of [F1, F2, F3]) {
  for (const [x,z] of [[-5,-2.5],[5,-2.5],[-4.5,2],[4.5,2]]) mann(x, fl+0.1, z);
}

const gc = [0xc9a84c, 0x7a6a5a, 0xd4cfc5, 0x5a7a5a, 0x8a6a4a, 0x4a5a6a, 0x9a8a7a, 0x6a7a4a];
for (const fl of [F1, F2, F3]) {
  const fw = fl===F1?W1:fl===F2?W2:W3, fd = fl===F1?D1:fl===F2?D2:D3;
  for (let i=0; i<8; i++) {
    const p = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.8, 0.03),
      new THREE.MeshStandardMaterial({ color: gc[(fl*8+i*3|0)%gc.length], roughness: 0.7 }));
    p.position.set(-fw/2+1.5+i*(fw-3)/7, fl+0.5, -fd/2+0.5); scene.add(p);
  }
}

for (let i=0; i<6; i++) {
  new THREE.Mesh(new THREE.BoxGeometry(1, 0.08, 0.06),
    new THREE.MeshStandardMaterial({ color: 0xc9a84c, metalness: 0.5, roughness: 0.2, emissive: 0xc9a84c, emissiveIntensity: 0.15 })
  ).position.set(-5.5+i*2.2, ROOF+0.05, -D3/2+0.2).apply(null, [scene]);
}

for (let i=0; i<4; i++) {
  new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.35, 0.7), tM()).position.set(-5+i*3.2, ROOF+0.175, -D3/2+1.8).apply(null, [scene]);
  new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), new THREE.MeshStandardMaterial({ color: 0x3a6a3a, roughness: 0.9 })
  ).position.set(-5+i*3.2, ROOF+0.5, -D3/2+1.8).apply(null, [scene]);
}

for (const x of [-8, 8]) {
  new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.06, 1.8, 8),
    new THREE.MeshStandardMaterial({ color: 0x2a2a2e, roughness: 0.3, metalness: 0.7 })
  ).position.set(x, 0.9, -D1/2-3).apply(null, [scene]);
  new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffeedd })
  ).position.set(x, 1.85, -D1/2-3).apply(null, [scene]);
  new THREE.PointLight(0xffeecc, 0.3, 6).position.set(x, 1.8, -D1/2-3).apply(null, [scene]);
}

const PG = new THREE.BufferGeometry();
const PA = new Float32Array(300*3);
for (let i=0; i<300*3; i++) PA[i] = (Math.random()-0.5)*80;
PG.setAttribute('position', new THREE.BufferAttribute(PA, 3));
const parts = new THREE.Points(PG, new THREE.PointsMaterial({ color: 0x8899aa, size: 0.04, transparent: true, opacity: 0.25 }));
parts.position.y = 8; scene.add(parts);

const FLOORS = [
  { y: F1, label: 'Ground Floor - Retail' },
  { y: F2, label: 'First Floor - Collection' },
  { y: F3, label: 'Second Floor - Atelier' },
];
let tCamY = F1+6, tTgtY = F1+3;

function goToFloor(idx) {
  const f = FLOORS[idx]; tCamY = f.y+6; tTgtY = f.y+3;
  document.querySelectorAll('#floor-ui button[data-floor]').forEach(b => b.classList.toggle('active', +b.dataset.floor===idx));
}
document.querySelectorAll('#floor-ui button[data-floor]').forEach(b => b.addEventListener('click', () => goToFloor(+b.dataset.floor)));
document.getElementById('reset-view').addEventListener('click', () => {
  camera.position.set(18, 9, 24); controls.target.set(0, 6, 0); controls.update(); goToFloor(0);
});

let waterTime = 0;
const water = new THREE.Mesh(new THREE.PlaneGeometry(9.6, 4.6),
  new THREE.MeshPhysicalMaterial({ color: 0x1a2a3a, roughness: 0, metalness: 0, transparent: true, opacity: 0.55, side: THREE.DoubleSide }));
water.position.set(0, 0.08, -D1/2-4);
water.rotation.x = -Math.PI / 2;
scene.add(water);

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

setTimeout(() => document.getElementById('loading').classList.add('hidden'), 500);

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  controls.target.y += (tTgtY - controls.target.y) * Math.min(1, dt*1.8);
  camera.position.y += (tCamY - camera.position.y) * Math.min(1, dt*1.8);
  waterTime += dt;
  water.position.y = 0.08 + Math.sin(waterTime * 0.5) * 0.008;
  water.material.opacity = 0.5 + Math.sin(waterTime * 0.3) * 0.05;
  const pa = parts.geometry.attributes.position.array;
  for (let i=1; i<pa.length; i+=3) { pa[i] += dt * 0.02; if (pa[i] > 40) pa[i] = -40; }
  parts.geometry.attributes.position.needsUpdate = true;
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
