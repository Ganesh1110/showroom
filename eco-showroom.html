<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earth Positive — 3D Eco Showroom</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #09090b;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      color: #fff;
    }
    canvas { display: block; }

    /* ── Loading screen ── */
    #loading {
      position: fixed; inset: 0; z-index: 100;
      background: #09090b;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.8s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading .spinner {
      width: 36px; height: 36px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: #c9a84c;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: rgba(255,255,255,0.4); font-size: 12px; letter-spacing: 0.15em; }

    /* ── Floor nav panel ── */
    #floor-nav {
      position: fixed; left: 24px; top: 50%; transform: translateY(-50%);
      z-index: 10;
      display: flex; flex-direction: column; gap: 8px;
    }
    #floor-nav button {
      width: 44px; height: 44px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.6);
      font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: all 0.25s ease;
      position: relative;
    }
    #floor-nav button:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }
    #floor-nav button.active {
      background: rgba(201,168,76,0.2);
      border-color: rgba(201,168,76,0.6);
      color: #e8d08a;
    }
    #floor-nav button .label {
      position: absolute; left: calc(100% + 12px); top: 50%;
      transform: translateY(-50%);
      white-space: nowrap;
      font-size: 11px; font-weight: 500;
      color: rgba(255,255,255,0.5);
      pointer-events: none;
      opacity: 0; transition: opacity 0.2s ease;
    }
    #floor-nav button:hover .label,
    #floor-nav button.active .label { opacity: 1; }
    #floor-nav .separator {
      width: 20px; height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 4px auto;
    }

    /* ── Brand watermark ── */
    #brand {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 10;
      text-align: center;
      pointer-events: none;
    }
    #brand h1 {
      font-size: 13px; font-weight: 600; letter-spacing: 0.2em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
    }
    #brand p {
      font-size: 10px; color: rgba(255,255,255,0.15);
      letter-spacing: 0.1em; margin-top: 2px;
    }

    /* ── Hotspot tooltip ── */
    #tooltip {
      position: fixed; z-index: 20;
      pointer-events: none;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 11px; font-weight: 500;
      color: rgba(255,255,255,0.85);
      opacity: 0; transition: opacity 0.2s ease;
      max-width: 200px;
    }
    #tooltip.visible { opacity: 1; }
    #tooltip .sub {
      font-size: 9px; font-weight: 400;
      color: rgba(255,255,255,0.4);
      margin-top: 2px;
    }

    /* ── Floor indicator badge ── */
    #floor-badge {
      position: fixed; top: 24px; right: 24px; z-index: 10;
      font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
      color: rgba(255,255,255,0.3);
      text-align: right;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    #floor-badge .num {
      font-size: 32px; font-weight: 200;
      color: rgba(255,255,255,0.12);
      line-height: 1;
    }
    #floor-badge .name {
      text-transform: uppercase;
    }

    /* ── Stats overlay (CO2, water, etc.) ── */
    #stats {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      z-index: 10;
      display: flex; gap: 24px;
      opacity: 0; transition: opacity 0.5s ease;
      pointer-events: none;
    }
    #stats.visible { opacity: 1; }
    #stats .stat {
      text-align: center;
    }
    #stats .stat .value {
      font-size: 18px; font-weight: 700;
      color: #e8d08a;
    }
    #stats .stat .label {
      font-size: 9px; font-weight: 500; letter-spacing: 0.08em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      #floor-nav { left: 12px; }
      #floor-nav button { width: 36px; height: 36px; font-size: 12px; }
    }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    <p>Building eco-structure</p>
  </div>

  <!-- Floor nav -->
  <div id="floor-nav">
    <button data-floor="3" id="btn-f3">
      3
      <span class="label">Creative Lab</span>
    </button>
    <button data-floor="2" id="btn-f2">
      2
      <span class="label">Looped Factory</span>
    </button>
    <button data-floor="1" id="btn-f1" class="active">
      1
      <span class="label">Raw Field</span>
    </button>
    <div class="separator"></div>
    <button data-floor="0" id="btn-f0">
      Ext
      <span class="label">Exterior View</span>
    </button>
  </div>

  <!-- Brand -->
  <div id="brand">
    <h1>Earth Positive</h1>
    <p>Climate-Neutral · Organic Cotton · Closed-Loop</p>
  </div>

  <!-- Floor badge -->
  <div id="floor-badge">
    <div class="num" id="badge-num">01</div>
    <div class="name" id="badge-name">The Raw Field</div>
  </div>

  <!-- Stats overlay -->
  <div id="stats">
    <div class="stat">
      <div class="value" id="stat-value-1">—</div>
      <div class="label" id="stat-label-1">Carbon Saved</div>
    </div>
    <div class="stat">
      <div class="value" id="stat-value-2">—</div>
      <div class="label" id="stat-label-2">Water Recycled</div>
    </div>
  </div>

  <!-- Tooltip -->
  <div id="tooltip">
    <div id="tooltip-title"></div>
    <div class="sub" id="tooltip-sub"></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.0/examples/jsm/",
      "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.7/index.js"
    }
  }
  </script>

  <script type="module">
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  IMPORTS
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  import * as THREE from 'three'
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
  import gsap from 'gsap'

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  CONSTANTS
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const FLOOR_CONFIG = [
    { y: -6,  label: 'Exterior View',    floorNum: '—' },
    { y: 0,   label: 'The Raw Field',     floorNum: '01' },
    { y: 15,  label: 'The Looped Factory', floorNum: '02' },
    { y: 30,  label: 'The Creative Lab',  floorNum: '03' },
  ]

  const FLOOR_HEIGHT = 4.8
  const FLOOR_WIDTH  = 22
  const FLOOR_DEPTH  = 16
  const PILLAR_RADIUS = 0.25
  const PILLAR_HEIGHT = FLOOR_HEIGHT - 0.6

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  PROCEDURAL TEXTURE GENERATORS (Canvas 2D)
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  function createCanvasTexture(w, h, drawFn) {
    const c = document.createElement('canvas')
    c.width = w; c.height = h
    drawFn(c.getContext('2d'), w, h)
    const tex = new THREE.CanvasTexture(c)
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping
    return tex
  }

  function concreteTexture() {
    return createCanvasTexture(512, 512, (ctx, w, h) => {
      ctx.fillStyle = '#b8b4ae'
      ctx.fillRect(0, 0, w, h)
      for (let i = 0; i < 8000; i++) {
        const x = Math.random() * w, y = Math.random() * h
        const v = 160 + Math.random() * 60
        ctx.fillStyle = `rgba(${v},${v-8},${v-12},${Math.random() * 0.3})`
        ctx.fillRect(x, y, Math.random() * 3 + 1, Math.random() * 3 + 1)
      }
      for (let i = 0; i < 60; i++) {
        ctx.strokeStyle = `rgba(0,0,0,${Math.random() * 0.04})`
        ctx.lineWidth = Math.random() * 2
        ctx.beginPath()
        ctx.moveTo(Math.random() * w, Math.random() * h)
        ctx.lineTo(Math.random() * w, Math.random() * h)
        ctx.stroke()
      }
    })
  }

  function polishedConcreteTexture() {
    return createCanvasTexture(512, 512, (ctx, w, h) => {
      ctx.fillStyle = '#c8c4bc'
      ctx.fillRect(0, 0, w, h)
      for (let i = 0; i < 4000; i++) {
        const x = Math.random() * w, y = Math.random() * h
        const v = 180 + Math.random() * 50
        ctx.fillStyle = `rgba(${v},${v-5},${v-8},${Math.random() * 0.15})`
        ctx.fillRect(x, y, 1, 1)
      }
      for (let i = 0; i < 100; i++) {
        ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.03})`
        ctx.fillRect(Math.random() * w, Math.random() * h, Math.random() * 40 + 10, 1)
      }
    })
  }

  function timberTexture() {
    return createCanvasTexture(512, 512, (ctx, w, h) => {
      const base = 140 + Math.random() * 30
      ctx.fillStyle = `rgb(${base},${base-20},${base-40})`
      ctx.fillRect(0, 0, w, h)
      for (let row = 0; row < 40; row++) {
        const y = row * 13 + Math.random() * 3
        const v = 120 + Math.random() * 50
        ctx.fillStyle = `rgba(${v},${v-15},${v-35},0.15)`
        ctx.fillRect(0, y, w, Math.random() * 4 + 2)
      }
      for (let i = 0; i < 200; i++) {
        const y = Math.random() * h
        ctx.strokeStyle = `rgba(60,40,20,${Math.random() * 0.06})`
        ctx.lineWidth = Math.random() * 2
        ctx.beginPath()
        ctx.moveTo(0, y)
        for (let x = 0; x < w; x += 8) {
          ctx.lineTo(x, y + (Math.random() - 0.5) * 3)
        }
        ctx.stroke()
      }
    })
  }

  function darkIronTexture() {
    return createCanvasTexture(512, 512, (ctx, w, h) => {
      ctx.fillStyle = '#2a2a2e'
      ctx.fillRect(0, 0, w, h)
      for (let i = 0; i < 6000; i++) {
        const x = Math.random() * w, y = Math.random() * h
        const v = 30 + Math.random() * 40
        ctx.fillStyle = `rgba(${v},${v},${v+3},0.2)`
        ctx.fillRect(x, y, 1, 1)
      }
      for (let x = 0; x < w; x += 64) {
        ctx.strokeStyle = 'rgba(100,100,110,0.08)'
        ctx.lineWidth = 1
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke()
      }
      for (let y = 0; y < h; y += 64) {
        ctx.strokeStyle = 'rgba(100,100,110,0.08)'
        ctx.lineWidth = 1
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke()
      }
    })
  }

  function terrazzoTexture() {
    return createCanvasTexture(512, 512, (ctx, w, h) => {
      ctx.fillStyle = '#e8e4dc'
      ctx.fillRect(0, 0, w, h)
      const colors = ['#c9a84c', '#8b7355', '#6b8e6b', '#a0524a', '#5a6a7a', '#d4b483']
      for (let i = 0; i < 400; i++) {
        const x = Math.random() * w, y = Math.random() * h
        const col = colors[Math.floor(Math.random() * colors.length)]
        ctx.fillStyle = col + '60'
        ctx.beginPath()
        ctx.arc(x, y, Math.random() * 6 + 2, 0, Math.PI * 2)
        ctx.fill()
      }
      for (let i = 0; i < 80; i++) {
        ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.05})`
        ctx.fillRect(Math.random() * w, Math.random() * h, Math.random() * 30 + 5, 1)
      }
    })
  }

  function sandstoneTexture() {
    return createCanvasTexture(512, 512, (ctx, w, h) => {
      ctx.fillStyle = '#c4b49a'
      ctx.fillRect(0, 0, w, h)
      for (let i = 0; i < 10000; i++) {
        const x = Math.random() * w, y = Math.random() * h
        const v = 160 + Math.random() * 50
        ctx.fillStyle = `rgba(${v},${v-10},${v-25},${Math.random() * 0.2})`
        ctx.fillRect(x, y, 1, 1)
      }
    })
  }

  function mossTexture() {
    return createCanvasTexture(256, 256, (ctx, w, h) => {
      ctx.fillStyle = '#3a5a3a'
      ctx.fillRect(0, 0, w, h)
      for (let i = 0; i < 5000; i++) {
        const x = Math.random() * w, y = Math.random() * h
        const g = 70 + Math.random() * 60
        ctx.fillStyle = `rgba(30,${g},40,${Math.random() * 0.3})`
        ctx.beginPath()
        ctx.arc(x, y, Math.random() * 3 + 1, 0, Math.PI * 2)
        ctx.fill()
      }
    })
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  MATERIALS
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  const TEX = {
    concrete: concreteTexture(),
    polishedConcrete: polishedConcreteTexture(),
    timber: timberTexture(),
    darkIron: darkIronTexture(),
    terrazzo: terrazzoTexture(),
    sandstone: sandstoneTexture(),
    moss: mossTexture(),
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  SCENE SETUP
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  const scene = new THREE.Scene()
  scene.background = new THREE.Color(0x0a0a0e)
  scene.fog = new THREE.Fog(0x0a0a0e, 35, 60)

  const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 80)
  camera.position.set(12, 5, 18)

  const renderer = new THREE.WebGLRenderer({ antialias: true })
  renderer.setSize(window.innerWidth, window.innerHeight)
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
  renderer.shadowMap.enabled = true
  renderer.shadowMap.type = THREE.PCFSoftShadowMap
  renderer.toneMapping = THREE.ACESFilmicToneMapping
  renderer.toneMappingExposure = 1.2
  renderer.outputColorSpace = THREE.SRGBColorSpace
  document.body.prepend(renderer.domElement)

  const controls = new OrbitControls(camera, renderer.domElement)
  controls.target.set(0, 0, 0)
  controls.minDistance = 5
  controls.maxDistance = 45
  controls.maxPolarAngle = Math.PI / 1.85
  controls.enableDamping = true
  controls.dampingFactor = 0.08
  controls.update()

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  LIGHTING
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  const ambientLight = new THREE.AmbientLight(0xe0f2fe, 0.4)
  scene.add(ambientLight)

  const sunLight = new THREE.DirectionalLight(0xfffaed, 2.5)
  sunLight.position.set(18, 28, 12)
  sunLight.castShadow = true
  sunLight.shadow.mapSize.width = 2048
  sunLight.shadow.mapSize.height = 2048
  sunLight.shadow.camera.near = 0.5
  sunLight.shadow.camera.far = 60
  sunLight.shadow.camera.left = -20
  sunLight.shadow.camera.right = 20
  sunLight.shadow.camera.top = 30
  sunLight.shadow.camera.bottom = -10
  sunLight.shadow.bias = -0.0005
  scene.add(sunLight)

  const fillLight = new THREE.DirectionalLight(0xe8eeff, 0.5)
  fillLight.position.set(-12, 15, -8)
  scene.add(fillLight)

  const rimLight = new THREE.DirectionalLight(0xffeedd, 0.3)
  rimLight.position.set(0, 35, -20)
  scene.add(rimLight)

  // ground fog sheet
  const groundGeo = new THREE.PlaneGeometry(80, 80)
  const groundMat = new THREE.MeshStandardMaterial({
    color: 0x0a0a0e,
    roughness: 1,
    metalness: 0,
  })
  const ground = new THREE.Mesh(groundGeo, groundMat)
  ground.rotation.x = -Math.PI / 2
  ground.position.y = -7
  ground.receiveShadow = true
  scene.add(ground)

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  BUILDING GROUP
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  const buildingGroup = new THREE.Group()
  scene.add(buildingGroup)

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  EXTERIOR SHELL
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  function buildExterior() {
    const group = new THREE.Group()

    // Rammed earth facade panels (left + right sides)
    const earthMat = new THREE.MeshStandardMaterial({
      map: TEX.sandstone,
      roughness: 0.9,
      metalness: 0.0,
      color: 0xb8a88a,
    })
    earthMat.map = TEX.sandstone

    // CLT facade pillars (front)
    const cltMat = new THREE.MeshStandardMaterial({
      map: TEX.timber,
      roughness: 0.85,
      metalness: 0.0,
      color: 0x8a7a5a,
    })

    const totalHeight = FLOOR_HEIGHT * 3 + 1.2
    const pillarPositions = [-7, -3.5, 0, 3.5, 7]

    pillarPositions.forEach((x) => {
      const pillar = new THREE.Mesh(
        new THREE.BoxGeometry(0.5, totalHeight, 0.5),
        cltMat
      )
      pillar.position.set(x, totalHeight / 2 - 0.6, -FLOOR_DEPTH / 2 - 0.8)
      pillar.castShadow = true
      group.add(pillar)
    })

    // Roof slab
    const roofMat = new THREE.MeshStandardMaterial({
      map: TEX.concrete,
      roughness: 0.6,
      metalness: 0.0,
      color: 0x9a9690,
    })
    const roof = new THREE.Mesh(
      new THREE.BoxGeometry(FLOOR_WIDTH + 1.6, 0.4, FLOOR_DEPTH + 1.6),
      roofMat
    )
    roof.position.set(0, totalHeight + 0.2, 0)
    roof.receiveShadow = true
    roof.castShadow = true
    group.add(roof)

    // Solar panel array on roof
    const solarMat = new THREE.MeshStandardMaterial({
      color: 0x1a2a3a,
      roughness: 0.3,
      metalness: 0.7,
    })
    for (let x = -7; x <= 7; x += 2.5) {
      for (let z = -4; z <= 4; z += 2.5) {
        const panel = new THREE.Mesh(
          new THREE.BoxGeometry(2, 0.06, 2),
          solarMat
        )
        panel.position.set(x, totalHeight + 0.45, z)
        panel.rotation.x = -0.15
        group.add(panel)
      }
    }

    // Wind turbine (decorative)
    const turbineMat = new THREE.MeshStandardMaterial({
      color: 0x6a7a8a,
      roughness: 0.4,
      metalness: 0.5,
    })
    const tower = new THREE.Mesh(
      new THREE.CylinderGeometry(0.08, 0.12, 2.5, 8),
      turbineMat
    )
    tower.position.set(9.5, totalHeight + 1.5, 5)
    group.add(tower)

    const bladeMat = new THREE.MeshStandardMaterial({
      color: 0xc8c8c8,
      roughness: 0.6,
      metalness: 0.2,
    })
    const blades = new THREE.Group()
    for (let i = 0; i < 3; i++) {
      const blade = new THREE.Mesh(
        new THREE.BoxGeometry(0.04, 1.2, 0.15),
        bladeMat
      )
      blade.position.y = 0.6
      blade.rotation.z = (i / 3) * Math.PI * 2
      blades.add(blade)
    }
    blades.position.set(9.5, totalHeight + 2.75, 5)
    blades.userData.isTurbine = true
    group.add(blades)

    return group
  }

  buildingGroup.add(buildExterior())

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  FLOOR BUILDER HELPERS
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  function createSlab(y, material, width = FLOOR_WIDTH, depth = FLOOR_DEPTH, height = 0.35) {
    const mesh = new THREE.Mesh(
      new THREE.BoxGeometry(width, height, depth),
      material
    )
    mesh.position.y = y
    mesh.receiveShadow = true
    mesh.castShadow = true
    return mesh
  }

  function createPillars(y, mat, count = 6) {
    const group = new THREE.Group()
    const positions = [
      [-8, -6], [-8, 6],
      [-4, -6], [-4, 6],
      [4, -6], [4, 6],
      [8, -6], [8, 6],
    ]
    positions.forEach(([x, z]) => {
      const pillar = new THREE.Mesh(
        new THREE.CylinderGeometry(PILLAR_RADIUS, PILLAR_RADIUS, PILLAR_HEIGHT, 12),
        mat
      )
      pillar.position.set(x, y + PILLAR_HEIGHT / 2 + 0.2, z)
      pillar.castShadow = true
      group.add(pillar)
    })
    return group
  }

  function createGlassWall(y, opacity = 0.25) {
    const mat = new THREE.MeshPhysicalMaterial({
      color: 0x88aacc,
      transparent: true,
      opacity,
      roughness: 0.1,
      metalness: 0.05,
      envMapIntensity: 0.5,
      side: THREE.DoubleSide,
    })
    const wall = new THREE.Mesh(
      new THREE.BoxGeometry(FLOOR_WIDTH - 1, FLOOR_HEIGHT * 0.65, 0.06),
      mat
    )
    wall.position.set(0, y + FLOOR_HEIGHT * 0.35, -FLOOR_DEPTH / 2 + 0.1)
    return wall
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  FLOOR CONTENT
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  /* ── Floor 1: The Raw Field ─────────────────────── */
  function buildFloor1() {
    const group = new THREE.Group()
    const yBase = 0

    // Slab — rough concrete
    const slabMat = new THREE.MeshStandardMaterial({
      map: TEX.concrete,
      roughness: 0.5,
      metalness: 0.0,
      color: 0xc0b8ae,
    })
    group.add(createSlab(yBase, slabMat))

    // CLT timber pillars
    const cltMat = new THREE.MeshStandardMaterial({
      map: TEX.timber,
      roughness: 0.85,
      metalness: 0.0,
      color: 0x8a7a5a,
    })
    group.add(createPillars(yBase, cltMat))

    // Glass back wall
    group.add(createGlassWall(yBase, 0.3))

    // ── Stone display pedestals ──
    const stoneMat = new THREE.MeshStandardMaterial({
      map: TEX.sandstone,
      roughness: 0.9,
      metalness: 0.0,
      color: 0xc4b49a,
    })

    const pedestalPositions = [
      [-5, -3, 0.8], [5, -3, 0.8],
      [-5, 3, 0.8],  [5, 3, 0.8],
      [0, 0, 1.0],
    ]

    pedestalPositions.forEach(([x, z, h]) => {
      const pedestal = new THREE.Mesh(
        new THREE.BoxGeometry(2.2, h, 1.6),
        stoneMat
      )
      pedestal.position.set(x, yBase + h / 2, z)
      pedestal.castShadow = true
      pedestal.receiveShadow = true
      group.add(pedestal)

      // Folded garment on pedestal (colored box stack)
      const fabricMat = new THREE.MeshStandardMaterial({
        color: new THREE.Color().setHSL(0.08 + Math.random() * 0.1, 0.3, 0.55),
        roughness: 0.85,
        metalness: 0.0,
      })
      const garment = new THREE.Mesh(
        new THREE.BoxGeometry(1.0, 0.12, 0.8),
        fabricMat
      )
      garment.position.set(x, yBase + h + 0.08, z)
      garment.castShadow = true
      group.add(garment)

      // Second fold layer
      const fabricMat2 = new THREE.MeshStandardMaterial({
        color: new THREE.Color().setHSL(0.08 + Math.random() * 0.1, 0.25, 0.65),
        roughness: 0.85,
        metalness: 0.0,
      })
      const fold2 = new THREE.Mesh(
        new THREE.BoxGeometry(0.7, 0.06, 0.6),
        fabricMat2
      )
      fold2.position.set(x, yBase + h + 0.17, z + 0.05)
      group.add(fold2)
    })

    // ── Cotton plant display (center) ──
    const planterMat = new THREE.MeshStandardMaterial({
      color: 0x5a4a3a,
      roughness: 0.9,
      metalness: 0.0,
    })
    const planter = new THREE.Mesh(
      new THREE.CylinderGeometry(0.8, 0.6, 0.5, 12),
      planterMat
    )
    planter.position.set(6, yBase + 0.25, -2)
    group.add(planter)

    const soilMat = new THREE.MeshStandardMaterial({
      color: 0x3a2a1a,
      roughness: 1,
      metalness: 0,
    })
    const soil = new THREE.Mesh(
      new THREE.CylinderGeometry(0.7, 0.7, 0.1, 12),
      soilMat
    )
    soil.position.set(6, yBase + 0.5, -2)
    group.add(soil)

    // Cotton plant stem
    const stemMat = new THREE.MeshStandardMaterial({
      color: 0x4a7a3a,
      roughness: 0.9,
      metalness: 0,
    })
    const stem = new THREE.Mesh(
      new THREE.CylinderGeometry(0.03, 0.04, 1.2, 6),
      stemMat
    )
    stem.position.set(6, yBase + 1.1, -2)
    group.add(stem)

    // Cotton boll
    const bollMat = new THREE.MeshStandardMaterial({
      color: 0xf0f0e8,
      roughness: 0.95,
      metalness: 0,
    })
    for (let i = 0; i < 3; i++) {
      const boll = new THREE.Mesh(
        new THREE.SphereGeometry(0.12, 8, 8),
        bollMat
      )
      boll.position.set(
        6 + (Math.random() - 0.5) * 0.3,
        yBase + 1.4 + Math.random() * 0.5,
        -2 + (Math.random() - 0.5) * 0.3
      )
      group.add(boll)
    }

    // ── Water basin installation (closed-loop animation) ──
    const basinMat = new THREE.MeshStandardMaterial({
      color: 0x6a7a6a,
      roughness: 0.6,
      metalness: 0.1,
    })
    const basin = new THREE.Mesh(
      new THREE.BoxGeometry(3, 0.4, 2),
      basinMat
    )
    basin.position.set(-5.5, yBase + 0.2, -2)
    basin.receiveShadow = true
    group.add(basin)

    // Water surface
    const waterMat = new THREE.MeshPhysicalMaterial({
      color: 0x3a8aba,
      roughness: 0.1,
      metalness: 0.0,
      transparent: true,
      opacity: 0.6,
      envMapIntensity: 0.4,
    })
    const water = new THREE.Mesh(
      new THREE.PlaneGeometry(2.6, 1.6),
      waterMat
    )
    water.rotation.x = -Math.PI / 2
    water.position.set(-5.5, yBase + 0.45, -2)
    water.userData.isWater = true
    group.add(water)

    // Hotspot marker (water basin)
    const hotspotMat = new THREE.MeshStandardMaterial({
      color: 0xc9a84c,
      emissive: 0xc9a84c,
      emissiveIntensity: 0.3,
      transparent: true,
      opacity: 0.6,
    })
    const hotspot = new THREE.Mesh(
      new THREE.RingGeometry(0.12, 0.2, 24),
      hotspotMat
    )
    hotspot.position.set(-5.5, yBase + 0.8, -2)
    hotspot.lookAt(camera.position)
    hotspot.userData.isHotspot = true
    hotspot.userData.hotspotData = {
      title: 'Closed-Loop Water System',
      sub: 'Zero wastewater discharge · 100% recycled dye water',
    }
    group.add(hotspot)

    return group
  }

  /* ── Floor 2: The Looped Factory ─────────────────── */
  function buildFloor2() {
    const group = new THREE.Group()
    const yBase = 15

    // Slab — dark iron
    const ironMat = new THREE.MeshStandardMaterial({
      map: TEX.darkIron,
      roughness: 0.3,
      metalness: 0.6,
      color: 0x3a3a3e,
    })
    group.add(createSlab(yBase, ironMat))

    // Iron pillars
    group.add(createPillars(yBase, ironMat))

    // Glass wall
    group.add(createGlassWall(yBase, 0.4))

    // ── Moss wall (back) ──
    const mossMat = new THREE.MeshStandardMaterial({
      map: TEX.moss,
      roughness: 0.95,
      metalness: 0.0,
      color: 0x4a7a4a,
    })
    const mossWall = new THREE.Mesh(
      new THREE.BoxGeometry(FLOOR_WIDTH - 3, FLOOR_HEIGHT * 0.7, 0.2),
      mossMat
    )
    mossWall.position.set(0, yBase + 1.8, -FLOOR_DEPTH / 2 + 0.8)
    group.add(mossWall)

    // ── Industrial pipe racks ──
    const pipeMat = new THREE.MeshStandardMaterial({
      color: 0x2a2a2e,
      roughness: 0.4,
      metalness: 0.7,
    })
    const pipePositions = [
      [-6, -4], [6, -4],
      [-6, 4],  [6, 4],
    ]
    pipePositions.forEach(([x, z]) => {
      // Vertical posts
      for (const side of [-1, 1]) {
        const post = new THREE.Mesh(
          new THREE.CylinderGeometry(0.04, 0.04, 2.2, 6),
          pipeMat
        )
        post.position.set(x + side * 1.2, yBase + 0.2 + 1.1, z)
        group.add(post)
      }
      // Horizontal bar
      const bar = new THREE.Mesh(
        new THREE.CylinderGeometry(0.03, 0.03, 2.6, 6),
        pipeMat
      )
      bar.rotation.z = Math.PI / 2
      bar.position.set(x, yBase + 2.0, z)
      group.add(bar)

      // Hanging garments
      const colors = [
        new THREE.Color().setHSL(0, 0.1, 0.2),
        new THREE.Color().setHSL(0.05, 0.2, 0.35),
        new THREE.Color().setHSL(0.08, 0.3, 0.45),
      ]
      for (let j = 0; j < 3; j++) {
        const hangerMat = new THREE.MeshStandardMaterial({
          color: colors[j % colors.length],
          roughness: 0.85,
          metalness: 0.0,
        })
        const hoodie = new THREE.Mesh(
          new THREE.BoxGeometry(0.7, 0.6, 0.08),
          hangerMat
        )
        hoodie.position.set(
          x - 0.6 + j * 0.6,
          yBase + 1.45,
          z + 0.1
        )
        group.add(hoodie)
      }
    })

    // ── CO2 savings display (digital scale) ──
    const displayMat = new THREE.MeshStandardMaterial({
      color: 0x1a1a22,
      roughness: 0.4,
      metalness: 0.3,
      emissive: 0x0a0a12,
      emissiveIntensity: 0.2,
    })
    const displayBoard = new THREE.Mesh(
      new THREE.BoxGeometry(2.5, 1.2, 0.08),
      displayMat
    )
    displayBoard.position.set(0, yBase + 1.0, -FLOOR_DEPTH / 2 + 1.2)
    group.add(displayBoard)

    // Display hotspot
    const co2Hotspot = new THREE.Mesh(
      new THREE.RingGeometry(0.12, 0.2, 24),
      new THREE.MeshStandardMaterial({
        color: 0x4ae84a,
        emissive: 0x4ae84a,
        emissiveIntensity: 0.3,
        transparent: true,
        opacity: 0.6,
      })
    )
    co2Hotspot.position.set(0, yBase + 1.6, -FLOOR_DEPTH / 2 + 1.2)
    co2Hotspot.lookAt(camera.position)
    co2Hotspot.userData.isHotspot = true
    co2Hotspot.userData.hotspotData = {
      title: '28 kg CO₂ saved per hoodie',
      sub: '90% carbon reduction vs conventional manufacturing',
    }
    group.add(co2Hotspot)

    return group
  }

  /* ── Floor 3: The Creative Lab ───────────────────── */
  function buildFloor3() {
    const group = new THREE.Group()
    const yBase = 30

    // Slab — terrazzo
    const terrazzoMat = new THREE.MeshStandardMaterial({
      map: TEX.terrazzo,
      roughness: 0.2,
      metalness: 0.0,
      color: 0xe8e4dc,
    })
    group.add(createSlab(yBase, terrazzoMat))

    // Pillars — timber (warmer)
    const warmTimberMat = new THREE.MeshStandardMaterial({
      map: TEX.timber,
      roughness: 0.7,
      metalness: 0.0,
      color: 0x9a8a6a,
    })
    group.add(createPillars(yBase, warmTimberMat))

    // Glass wall
    group.add(createGlassWall(yBase, 0.5))

    // ── Recycled fiber tables ──
    const fiberMat = new THREE.MeshStandardMaterial({
      color: 0x7a8a6a,
      roughness: 0.85,
      metalness: 0.0,
    })
    const tablePositions = [
      [-5, -3], [5, -3],
      [-5, 3],  [5, 3],
    ]
    tablePositions.forEach(([x, z]) => {
      const table = new THREE.Mesh(
        new THREE.BoxGeometry(2.4, 0.8, 1.4),
        fiberMat
      )
      table.position.set(x, yBase + 0.4, z)
      table.castShadow = true
      table.receiveShadow = true
      group.add(table)
    })

    // ── 34-color swatch wall ──
    const swatchWallMat = new THREE.MeshStandardMaterial({
      color: 0x1a1a22,
      roughness: 0.6,
      metalness: 0.1,
    })
    const swatchWall = new THREE.Mesh(
      new THREE.BoxGeometry(FLOOR_WIDTH - 4, FLOOR_HEIGHT * 0.55, 0.08),
      swatchWallMat
    )
    swatchWall.position.set(0, yBase + 1.6, -FLOOR_DEPTH / 2 + 0.4)
    group.add(swatchWall)

    // Color swatches
    const swatchColors = []
    for (let i = 0; i < 34; i++) {
      swatchColors.push(new THREE.Color().setHSL(i / 34, 0.6 + Math.random() * 0.3, 0.5 + Math.random() * 0.3))
    }
    const cols = 17
    swatchColors.forEach((col, i) => {
      const r = Math.floor(i / cols)
      const c = i % cols
      const swatch = new THREE.Mesh(
        new THREE.BoxGeometry(0.55, 0.35, 0.02),
        new THREE.MeshStandardMaterial({ color: col, roughness: 0.6, metalness: 0 })
      )
      swatch.position.set(
        (c - (cols - 1) / 2) * 0.65,
        yBase + 0.7 + r * 0.45,
        -FLOOR_DEPTH / 2 + 0.5
      )
      group.add(swatch)
    })

    // ── Customization portal (center) ──
    const portalMat = new THREE.MeshStandardMaterial({
      color: 0x2a2a32,
      roughness: 0.4,
      metalness: 0.3,
    })
    const portalBase = new THREE.Mesh(
      new THREE.BoxGeometry(3, 0.2, 2),
      portalMat
    )
    portalBase.position.set(0, yBase + 0.1, 0)
    portalBase.receiveShadow = true
    group.add(portalBase)

    // Central garment canvas (blank tee)
    const teeMat = new THREE.MeshStandardMaterial({
      color: 0xf0f0e8,
      roughness: 0.85,
      metalness: 0.0,
    })
    const teeCanvas = new THREE.Mesh(
      new THREE.BoxGeometry(1.4, 1.2, 0.04),
      teeMat
    )
    teeCanvas.position.set(0, yBase + 0.9, 0.5)
    group.add(teeCanvas)

    // Portal hotspot
    const portalHotspot = new THREE.Mesh(
      new THREE.RingGeometry(0.12, 0.2, 24),
      new THREE.MeshStandardMaterial({
        color: 0xc9a84c,
        emissive: 0xc9a84c,
        emissiveIntensity: 0.3,
        transparent: true,
        opacity: 0.6,
      })
    )
    portalHotspot.position.set(0, yBase + 1.5, 0.5)
    portalHotspot.lookAt(camera.position)
    portalHotspot.userData.isHotspot = true
    portalHotspot.userData.hotspotData = {
      title: '3D Customization Portal',
      sub: 'Upload artwork · Simulate water-based screen printing',
    }
    group.add(portalHotspot)

    // Hanging lamps above
    const lampMat = new THREE.MeshStandardMaterial({
      color: 0xffeecc,
      emissive: 0xffeedd,
      emissiveIntensity: 0.3,
    })
    for (let x = -6; x <= 6; x += 4) {
      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.02, 0.02, 0.8, 6),
        new THREE.MeshStandardMaterial({ color: 0x2a2a2a, metalness: 0.5, roughness: 0.4 })
      )
      pole.position.set(x, yBase + FLOOR_HEIGHT - 0.8, 0)
      group.add(pole)

      const lamp = new THREE.Mesh(
        new THREE.SphereGeometry(0.15, 12, 12),
        lampMat
      )
      lamp.position.set(x, yBase + FLOOR_HEIGHT - 0.4, 0)
      group.add(lamp)
    }

    return group
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  ASSEMBLE FLOORS
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  const floorGroups = []

  function initBuilding() {
    const f1 = buildFloor1()
    f1.userData.floorIndex = 1
    f1.userData.label = 'The Raw Field'
    buildingGroup.add(f1)
    floorGroups[1] = f1

    const f2 = buildFloor2()
    f2.userData.floorIndex = 2
    f2.userData.label = 'The Looped Factory'
    buildingGroup.add(f2)
    floorGroups[2] = f2

    const f3 = buildFloor3()
    f3.userData.floorIndex = 3
    f3.userData.label = 'The Creative Lab'
    buildingGroup.add(f3)
    floorGroups[3] = f3
  }

  initBuilding()

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  GSAP INTER-FLOOR NAVIGATION
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  let currentFloor = 1
  let isTransitioning = false

  window.goToFloor = function goToFloor(floorNumber) {
    if (isTransitioning || floorNumber === currentFloor) return
    isTransitioning = true

    const config = FLOOR_CONFIG[floorNumber]
    if (!config) return

    currentFloor = floorNumber

    // Update UI
    document.querySelectorAll('#floor-nav button').forEach((btn) => {
      btn.classList.toggle('active', parseInt(btn.dataset.floor) === floorNumber)
    })
    document.getElementById('badge-num').textContent = floorNumber === 0 ? '—' : String(floorNumber).padStart(2, '0')
    document.getElementById('badge-name').textContent = config.label

    // Stats overlay per floor
    const stats = document.getElementById('stats')
    const sv1 = document.getElementById('stat-value-1')
    const sl1 = document.getElementById('stat-label-1')
    const sv2 = document.getElementById('stat-value-2')
    const sl2 = document.getElementById('stat-label-2')

    stats.classList.remove('visible')
    if (floorNumber === 1) {
      sv1.textContent = '0L'; sl1.textContent = 'Wastewater Discharge'
      sv2.textContent = '100%'; sl2.textContent = 'Water Recycled'
      setTimeout(() => stats.classList.add('visible'), 600)
    } else if (floorNumber === 2) {
      sv1.textContent = '28 kg'; sl1.textContent = 'CO₂ Saved / Hoodie'
      sv2.textContent = '90%'; sl2.textContent = 'Carbon Reduction'
      setTimeout(() => stats.classList.add('visible'), 600)
    } else if (floorNumber === 3) {
      sv1.textContent = '34'; sl1.textContent = 'Vibrant Color Swatches'
      sv2.textContent = 'Water-Based'; sl2.textContent = 'Eco-Friendly Inks'
      setTimeout(() => stats.classList.add('visible'), 600)
    }

    // GSAP timeline — elevator animation
    const targetY = config.y
    const tl = gsap.timeline({
      onComplete: () => { isTransitioning = false },
    })

    tl.to(camera.position, {
      y: targetY + 5,
      duration: 1.8,
      ease: 'power3.inOut',
      onUpdate: () => controls.update(),
    }, 0)

    tl.to(controls.target, {
      y: targetY,
      duration: 1.8,
      ease: 'power3.inOut',
      onUpdate: () => controls.update(),
    }, 0)
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  INTERACTION (Raycaster)
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  const raycaster = new THREE.Raycaster()
  const pointer = new THREE.Vector2()
  const tooltip = document.getElementById('tooltip')
  const tooltipTitle = document.getElementById('tooltip-title')
  const tooltipSub = document.getElementById('tooltip-sub')

  let hoveredHotspot = null

  function collectHotspots() {
    const hotspots = []
    buildingGroup.traverse((child) => {
      if (child.userData && child.userData.isHotspot) {
        hotspots.push(child)
      }
    })
    return hotspots
  }

  const hotspots = collectHotspots()
  // Make hotspots interactive — store a ref to their billboard
  hotspots.forEach((h) => {
    h.userData.originalScale = h.scale.clone()
  })

  function onPointerMove(event) {
    pointer.x = (event.clientX / window.innerWidth) * 2 - 1
    pointer.y = -(event.clientY / window.innerHeight) * 2 + 1

    raycaster.setFromCamera(pointer, camera)
    const intersects = raycaster.intersectObjects(hotspots)

    if (intersects.length > 0) {
      const hit = intersects[0].object
      if (hit.userData.isHotspot) {
        if (hoveredHotspot !== hit) {
          hoveredHotspot = hit
          tooltipTitle.textContent = hit.userData.hotspotData.title
          tooltipSub.textContent = hit.userData.hotspotData.sub
          tooltip.classList.add('visible')
        }
        tooltip.style.left = (event.clientX + 16) + 'px'
        tooltip.style.top = (event.clientY - 10) + 'px'
        document.body.style.cursor = 'pointer'
        return
      }
    }

    if (hoveredHotspot) {
      hoveredHotspot = null
      tooltip.classList.remove('visible')
      document.body.style.cursor = 'default'
    }
  }

  window.addEventListener('pointermove', onPointerMove)

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  RESIZE
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight
    camera.updateProjectionMatrix()
    renderer.setSize(window.innerWidth, window.innerHeight)
  })

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  ANIMATION LOOP
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  function animate() {
    requestAnimationFrame(animate)

    // Spin wind turbine blades
    buildingGroup.traverse((child) => {
      if (child.userData && child.userData.isTurbine) {
        child.rotation.y += 0.008
      }
      // Animate water surfaces
      if (child.userData && child.userData.isWater) {
        child.position.y += Math.sin(Date.now() * 0.001) * 0.0003
      }
      // Billboarding hotspots toward camera
      if (child.userData && child.userData.isHotspot) {
        child.lookAt(camera.position)
      }
    })

    controls.update()
    renderer.render(scene, camera)
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  UI BINDING
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  document.querySelectorAll('#floor-nav button').forEach((btn) => {
    btn.addEventListener('click', () => {
      goToFloor(parseInt(btn.dataset.floor))
    })
  })

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  START
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  // Dismiss loading
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden')
    setTimeout(() => document.getElementById('loading').remove(), 800)
  }, 600)

  // Start render loop
  animate()

  // Initial floor stats
  setTimeout(() => {
    const stats = document.getElementById('stats')
    stats.classList.add('visible')
    document.getElementById('stat-value-1').textContent = '0L'
    document.getElementById('stat-label-1').textContent = 'Wastewater Discharge'
    document.getElementById('stat-value-2').textContent = '100%'
    document.getElementById('stat-label-2').textContent = 'Water Recycled'
  }, 1200)

  console.log('🌿 Earth Positive — 3D Eco Showroom loaded')
  console.log('🗺️  Use goToFloor(floorNumber) to navigate: 0=Exterior, 1=Raw Field, 2=Looped Factory, 3=Creative Lab')
  </script>
</body>
</html>
